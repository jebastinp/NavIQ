# Render blueprint — auto-deploys the backend from GitHub.
# Push your code to GitHub, then go to render.com → "New" → "Blueprint" → connect repo.
# Render will detect this file and create the service.
#
# After deploy, set the env vars listed under `envVars` in the Render dashboard.
services:
  - type: web
    name: naviq-backend
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: if [ -f requirements.txt ]; then pip install -r requirements.txt; else cd backend && pip install -r requirements.txt; fi
    startCommand: if [ -f main.py ]; then uvicorn main:app --host 0.0.0.0 --port $PORT; else cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT; fi
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ORS_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
